# .github/workflows/sync-upstream.yml
name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # Chạy mỗi ngày lúc 00:00 UTC
  workflow_dispatch:       # Cho phép chạy thủ công trên GitHub UI

# Cấp quyền write để có thể push lên repo
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Lấy toàn bộ lịch sử commit, cần thiết để merge

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        run: |
          # Thêm remote trỏ về repo gốc
          git remote add upstream https://github.com/HKUDS/DeepTutor.git

          # Tải toàn bộ thay đổi từ upstream
          git fetch upstream

          # Merge thay đổi từ upstream/main vào nhánh hiện tại
          # --no-edit: không mở editor để nhập commit message
          git merge upstream/main --no-edit

          # Push kết quả lên fork của bạn
          git push origin main
